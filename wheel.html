<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Tip of the Week Presenter </title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: white;
        }
        
        h1 {
            font-size: 2.5em;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            color: gold;
        }
        
        .wheel-container {
            position: relative;
            width: 600px;
            height: 600px;
            margin: 30px 0;
        }
        
        #wheelCanvas {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
        }
        
        .pointer {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 25px solid transparent;
            border-right: 25px solid transparent;
            border-top: 50px solid #ff0000;
            filter: drop-shadow(0 3px 5px rgba(0,0,0,0.5));
            z-index: 10;
        }
        
        .pointer::after {
            content: '';
            position: absolute;
            top: -50px;
            left: -20px;
            width: 40px;
            height: 40px;
            background: white;
            border-radius: 50%;
            border: 4px solid #ff0000;
        }
        
        button {
            padding: 20px 50px;
            font-size: 1.5em;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }
        
        button:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }
        
        button:disabled { opacity: 0.6; cursor: not-allowed; }
    </style>
</head>
<body>
    <h1>🎯 AI Tip of the Week Presenter 🎯</h1>
    
    <div class="wheel-container">
        <div class="pointer"></div>
        <canvas id="wheelCanvas" width="600" height="600"></canvas>
    </div>
    
    <button id="spinBtn" onclick="spin()">SPIN THE WHEEL</button>

    <script>
        const teamMembers = ["Vane", "Katie", "Hermes", "Rosi", "Mariana", "Jeanne", "Ashley", "Jairo", "Diones", "Christina", "Troy"];

        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');
        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        const radius = 280;
        
        let currentRotation = 0;
        let isSpinning = false;

        function getColor(index, total) {
            const hue = (index * 360) / total;
            return `hsl(${hue}, 70%, 60%)`;
        }
        
        function drawWheel(rotation = 0) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const anglePerSegment = (2 * Math.PI) / teamMembers.length;

            // Draw segments
            teamMembers.forEach((member, index) => {
                const startAngle = (index * anglePerSegment) + rotation;
                const endAngle = ((index + 1) * anglePerSegment) + rotation;

                // Main segment
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, startAngle, endAngle);
                ctx.closePath();
                ctx.fillStyle = getColor(index, teamMembers.length);
                ctx.fill();
                ctx.strokeStyle = 'white';
                ctx.lineWidth = 4;
                ctx.stroke();
            });

            // Draw text
            teamMembers.forEach((member, index) => {
                const angle = (index * anglePerSegment) + anglePerSegment / 2 + rotation;
                const textX = centerX + Math.cos(angle) * (radius * 0.65);
                const textY = centerY + Math.sin(angle) * (radius * 0.65);

                ctx.save();
                ctx.translate(textX, textY);
                ctx.rotate(angle + Math.PI / 2);
                ctx.font = 'bold 20px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.strokeStyle = 'black';
                ctx.lineWidth = 5;
                ctx.strokeText(member, 0, 0);
                ctx.fillStyle = 'white';
                ctx.fillText(member, 0, 0);
                ctx.restore();
            });

            // Outline
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, 0, 2 * Math.PI);
            ctx.strokeStyle = 'gold';
            ctx.lineWidth = 5;
            ctx.stroke();
        }

        function spin() {
            if (isSpinning) return;
            isSpinning = true;
            document.getElementById('spinBtn').disabled = true;

            const anglePerSegment = (2 * Math.PI) / teamMembers.length;
            const winnerIndex = Math.floor(Math.random() * teamMembers.length);

            const winnerAngle = winnerIndex * anglePerSegment + anglePerSegment / 2;

            const extraSpins = 5 + Math.random() * 3;

            const targetAngle = (extraSpins * 2 * Math.PI) - winnerAngle - (Math.PI / 2);

            const duration = 4000;
            const startTime = Date.now();
            const startRotation = currentRotation;

            function animate() {
                const elapsed = Date.now() - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const easeOut = 1 - Math.pow(1 - progress, 3);

                currentRotation = startRotation + targetAngle * easeOut;
                drawWheel(currentRotation);

                if (progress < 1) {
                    requestAnimationFrame(animate);
                } else {
                    isSpinning = false;
                    document.getElementById('spinBtn').disabled = false;
                }
            }

            animate();
        }

        drawWheel();
    </script>
</body>
</html>
